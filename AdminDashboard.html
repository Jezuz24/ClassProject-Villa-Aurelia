<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Villa Aurelia - Admin Dashboard</title>

  <!-- Tailwind CSS CDN for utility classes -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom stylesheet for the Villa Aurelia theme -->
  <link rel="stylesheet" href="style.css">

  <!-- Main JavaScript file for validation, login, booking, and dashboard behavior -->
  <script src="validation.js" defer></script>
</head>
<body class="min-h-screen bg-slate-900 text-stone-900">
  <!-- Navigation bar used across the whole hotel website -->
  <header class="bg-slate-950/95 text-stone-100 px-4 sm:px-6 md:px-8 py-4 md:py-5 border-b border-emerald-800/50">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row gap-4 justify-between items-center">
      <h1 class="text-xl sm:text-2xl font-bold tracking-wide text-emerald-300">Villa Aurelia</h1>

      <nav class="flex flex-wrap justify-center gap-2 sm:gap-3 md:gap-4 text-xs sm:text-sm">
        <a href="index.html" class="hover:text-emerald-300">Home</a>
        <a href="villa-aurelia.html" class="hover:text-emerald-300">Booking</a>
        <a href="AboutUs.html" class="hover:text-emerald-300">About Us</a>
        <a href="Amenities.html" class="hover:text-emerald-300">Amenities</a>
        <a href="GuestReviews.html" class="hover:text-emerald-300">Guest Reviews</a>
        <a href="CustomerService.html" class="hover:text-emerald-300">Customer Service</a>
        <a href="Account.html" class="hover:text-emerald-300">Account</a>
        <a href="Profile.html" class="text-emerald-300">Profile</a>
        <span id="navUser" class="text-emerald-300 font-bold"></span>
      </nav>
    </div>
  </header>

  <!-- Admin dashboard hero -->
    <section class="relative h-[320px] sm:h-[360px] md:h-[400px] bg-cover bg-center flex items-center justify-center"
    style="background-image: url('images/hero/banner.png');">

    <!-- Overlay -->
    <div class="absolute inset-0 bg-black/60"></div>

    <!-- Content -->
    <div class="relative z-10 text-center text-white">
      <h2 class="text-3xl sm:text-4xl font-bold glow-text">Administrator Dashboard</h2>
      <p class="text-stone-200 mt-4">Full access hotel management page.</p>
    </div>
  </section>

  <!-- JavaScript will render all admin controls inside this container -->
  <section class="w-full min-h-[55vh] px-4 sm:px-6 md:px-8 py-12 md:py-16 bg-gradient-to-br from-gray-800 via-slate-600 to-gray-800 overflow-hidden">
    <div id="adminContent"></div>
  </section>

  <!-- Footer -->
  <footer class="bg-slate-950 text-stone-300 text-center py-6 border-t border-emerald-900">
    <p>© 2026 Villa Aurelia Nature Hotel Booking System</p>
  </footer>

  <script>
    // Render the administrator dashboard and optionally filter users by search text.
    function renderAdminDashboard(searchValue = "") {
      let adminContent = document.getElementById("adminContent");
      let users = JSON.parse(localStorage.getItem("villaUsers")) || [];

      let filteredUsers = users.filter(user =>
        user.firstName.toLowerCase().includes(searchValue.toLowerCase()) ||
        user.lastName.toLowerCase().includes(searchValue.toLowerCase()) ||
        user.email.toLowerCase().includes(searchValue.toLowerCase())
      );

      let userCards = filteredUsers.map(user => {
        let bookingList = "";

        // Build each guest booking card.
        if (user.bookings && user.bookings.length > 0) {
          bookingList = user.bookings.map((booking, index) => {
            return `
              <div class="bg-white rounded-xl border p-4 mt-3">
                <p><strong>Booking #${index + 1}</strong></p>
                <p><strong>Status:</strong> ${booking.status || "Pending"}</p>
                <p><strong>Booking ID:</strong> ${booking.bookingId || "N/A"}</p>
                <p><strong>Room:</strong> ${booking.roomType || "N/A"}</p>
                <p><strong>Check-in:</strong> ${booking.checkin || "N/A"}</p>
                <p><strong>Check-out:</strong> ${booking.checkout || "N/A"}</p>
                <p><strong>Guests:</strong> ${booking.guests}</p>
                <p><strong>Nights:</strong> ${booking.nights}</p>
                <p><strong>Total:</strong> $${booking.total}</p>
                <p><strong>Updated:</strong> ${booking.lastUpdated || "N/A"}</p>

                <div class="flex flex-wrap gap-2 mt-3">
                  <button onclick="updateBookingStatus('${user.email}', ${index}, 'Approved')" class="bg-green-600 text-white px-3 py-1 rounded hover:bg-green-700">Approve</button>
                  <button onclick="updateBookingStatus('${user.email}', ${index}, 'Rejected')" class="bg-red-600 text-white px-3 py-1 rounded hover:bg-red-700">Reject</button>
                  <button onclick="editBooking('${user.email}', ${index})" class="bg-blue-600 text-white px-3 py-1 rounded hover:bg-blue-700">Edit</button>
                  <button onclick="cancelGuestBooking('${user.email}', ${index})" class="bg-orange-600 text-white px-3 py-1 rounded hover:bg-orange-700">Cancel</button>
                </div>
              </div>
            `;
          }).join("");
        } else {
          bookingList = "<p class='mt-3 text-stone-600'>No bookings yet.</p>";
        }

        return `
          <div class="glass-card p-6 rounded-3xl shadow-xl border border-emerald-200">
            <h3 class="text-xl font-bold text-emerald-700">${user.firstName} ${user.lastName}</h3>
            <p><strong>Email:</strong> ${user.email}</p>
            <p><strong>Account Type:</strong> ${user.accountType}</p>
            <p><strong>Total Bookings:</strong> ${user.bookings ? user.bookings.length : 0}</p>

            <button onclick="removeGuestAccount('${user.email}')" class="mt-4 bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700">
              Remove Guest
            </button>

            <div class="mt-5">
              <h4 class="font-bold text-stone-800">Bookings</h4>
              ${bookingList}
            </div>
          </div>
        `;
      }).join("");

      if (!userCards) {
        userCards =
          "<div class='glass-card rounded-3xl shadow-xl p-6 sm:p-8 border border-emerald-200 text-center'>" +
          "<p>No matching guest accounts found.</p>" +
          "</div>";
      }

      // Render search bar and dashboard cards.
      adminContent.innerHTML =
        "<h3 class='text-2xl sm:text-3xl font-bold mb-8 text-white text-center'>Registered Guests and Bookings</h3>" +
        "<input id='searchUser' placeholder='Search by name or email...' class='w-full p-3 border rounded-lg mb-6'>" +
        "<div class='grid grid-cols-1 md:grid-cols-2 gap-6'>" +
        userCards +
        "</div>";

      document.getElementById("searchUser").value = searchValue;

      // Re-render the dashboard without refreshing the page when searching.
      document.getElementById("searchUser").addEventListener("input", function () {
        renderAdminDashboard(this.value);
      });
    }

    window.onload = function () {
      let currentUser = JSON.parse(localStorage.getItem("villaCurrentUser"));
      let loggedIn = localStorage.getItem("villaLoggedIn");
      let adminContent = document.getElementById("adminContent");

      // Security check for admin-only page.
      if (loggedIn !== "true" || !currentUser || currentUser.accountType !== "Administrator") {
        adminContent.innerHTML =
          "<div class='glass-card rounded-3xl shadow-xl p-6 sm:p-8 border border-red-200 text-center'>" +
          "<h3 class='text-2xl font-bold text-red-600'>Access Denied</h3>" +
          "<p class='mt-3'>Only the administrator can view this page.</p>" +
          "<a href='Login.html' class='inline-block mt-5 bg-emerald-700 text-white px-6 py-3 rounded-xl'>Login</a>" +
          "</div>";
        return;
      }

      renderAdminDashboard();
    };
  </script>
</body>
</html>
