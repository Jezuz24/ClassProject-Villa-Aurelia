<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Villa Aurelia - Profile</title>

  <!-- Tailwind CSS CDN for utility classes -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom stylesheet for the Villa Aurelia theme -->
  <link rel="stylesheet" href="style.css">

  <!-- Main JavaScript file for validation, login, booking, and dashboard behavior -->
  <script src="validation.js" defer></script>
</head>
<body class="bg-stone-100 text-stone-900">
  <!-- Navigation bar used across the whole hotel website -->
  <header class="bg-slate-950/95 text-stone-100 px-4 sm:px-6 md:px-8 py-4 md:py-5 border-b border-emerald-800/50">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row gap-4 justify-between items-center">
      <h1 class="text-xl sm:text-2xl font-bold tracking-wide text-emerald-300">Villa Aurelia</h1>

      <nav class="flex flex-wrap justify-center gap-2 sm:gap-3 md:gap-4 text-xs sm:text-sm">
        <a href="index.html" class="hover:text-emerald-300">Home</a>
        <a href="villa-aurelia.html" class="hover:text-emerald-300">Booking</a>
        <a href="AboutUs.html" class="hover:text-emerald-300">About Us</a>
        <a href="Amenities.html" class="hover:text-emerald-300">Amenities</a>
        <a href="GuestReviews.html" class="hover:text-emerald-300">Guest Reviews</a>
        <a href="CustomerService.html" class="hover:text-emerald-300">Customer Service</a>
        <a href="Account.html" class="hover:text-emerald-300">Account</a>
        <a href="Profile.html" class="text-emerald-300">Profile</a>
        <span id="navUser" class="text-emerald-300 font-bold"></span>
      </nav>
    </div>
  </header>

  <!-- Profile page hero -->
  <!-- Booking page hero -->
  <section class="relative h-[320px] sm:h-[360px] md:h-[400px] bg-cover bg-center flex items-center justify-center"
    style="background-image: url('images/hero/banner.png');">

    <!-- Overlay -->
    <div class="absolute inset-0 bg-black/60"></div>

    <!-- Content -->
    <div class="relative z-10 text-center text-white">
      <p class="uppercase tracking-[0.3em] text-emerald-300 font-semibold">Account Profile</p>
      <h2 class="text-3xl sm:text-4xl md:text-5xl font-bold mt-4 glow-text">Your Villa Aurelia Profile</h2>
      <p class="text-stone-200 mt-4">View your account role and booking confirmation.</p>
      <div id="profileHeaderButtons"></div>
    </div>
  </section>

  <!-- Profile content section -->
  <section class="relative py-12 sm:py-16 md:py-20 px-4 sm:px-6 md:px-8 bg-gradient-to-br from-green-800 via-slate-600 to-green-800 overflow-hidden">
    <div class="max-w-6xl mx-auto text-center">
      <!-- ambient glow -->
      <div class="absolute -top-32 -left-32 w-[500px] h-[500px] bg-emerald-500/20 blur-[150px] rounded-full"></div>
      <div class="absolute -bottom-32 -right-32 w-[500px] h-[500px] bg-teal-400/20 blur-[150px] rounded-full"></div>
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="glass-card rounded-3xl shadow-xl p-6 sm:p-8 border border-emerald-200">
              <h3 class="text-2xl font-bold mb-4">Account Information</h3>
              <div id="profileInfo" class="text-stone-700 space-y-2"></div>
            </div>

        <div class="glass-card rounded-3xl shadow-xl p-6 sm:p-8 border border-emerald-200">
          <h3 class="text-2xl font-bold mb-4">Latest Booking Confirmation</h3>
          <div id="bookingInfo" class="text-stone-700 space-y-2"></div>
        </div>
      </div>

      <div id="bookingHistory" class="mt-8"></div>
      <div id="rolePanel" class="mt-8"></div>

      <div class="text-center mt-8">
        <button onclick="logoutUser()" class="bg-red-600 text-white px-6 py-3 rounded-xl hover:bg-red-700">Logout</button>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-slate-950 text-stone-300 text-center py-6 border-t border-emerald-900">
    <p>© 2026 Villa Aurelia Nature Hotel Booking System</p>
  </footer>

  <script>
    window.onload = function () {
      // Get login and user data from localStorage.
      let currentUser = JSON.parse(localStorage.getItem("villaCurrentUser"));
      let loggedIn = localStorage.getItem("villaLoggedIn");

      // Get profile page containers.
      let profileInfo = document.getElementById("profileInfo");
      let bookingInfo = document.getElementById("bookingInfo");
      let bookingHistory = document.getElementById("bookingHistory");
      let rolePanel = document.getElementById("rolePanel");

      // Stop here if the user is not logged in.
      if (loggedIn !== "true" || !currentUser) {
        document.getElementById("profileHeaderButtons").innerHTML =
          "<a href='Login.html' class='inline-block mt-4 bg-emerald-700 text-white px-6 py-3 rounded-xl'>Go to Login</a>";

        profileInfo.innerHTML = "<p>Please login to view your profile.</p>";
        bookingInfo.innerHTML = "<p>No booking information available.</p>";
        bookingHistory.innerHTML = "";
        rolePanel.innerHTML =
          "<div class='glass-card p-6 sm:p-8 border border-red-200 text-center rounded-3xl'>" +
          "<p class='font-bold text-red-600'>Access denied. Please login first.</p>" +
          "</div>";
        return;
      }

      // Show the correct dashboard button depending on account role.
      if (currentUser.accountType === "Administrator") {
        document.getElementById("profileHeaderButtons").innerHTML =
          "<a href='AdminDashboard.html' class='inline-block mt-4 bg-emerald-700 text-white px-6 py-3 rounded-xl'>Open Admin Dashboard</a>";
      } else {
        document.getElementById("profileHeaderButtons").innerHTML =
          "<a href='GuestDashboard.html' class='inline-block mt-4 bg-emerald-700 text-white px-6 py-3 rounded-xl'>Open Guest Dashboard</a>";
      }

      // Display account information.
      profileInfo.innerHTML =
        "<p><strong>Name:</strong> " + currentUser.firstName + " " +
        (currentUser.middleName ? currentUser.middleName + " " : "") +
        currentUser.lastName + "</p>" +
        "<p><strong>Email:</strong> " + currentUser.email + "</p>" +
        "<p><strong>Account Type:</strong> " + currentUser.accountType + "</p>";

      // Latest booking should come from the logged-in user's account, not the global latest booking.
      let booking = null;
      if (currentUser.bookings && currentUser.bookings.length > 0) {
        booking = currentUser.bookings[currentUser.bookings.length - 1];
      }

      // Display latest booking receipt.
      if (booking) {
        let statusColor = "bg-yellow-100 text-yellow-700 border-yellow-300";
        let statusMessage = "Your booking is pending administrator approval.";

        if (booking.status === "Approved") {
          statusColor = "bg-green-100 text-green-700 border-green-300";
          statusMessage = "Your booking has been approved. We look forward to your stay.";
        }

        if (booking.status === "Rejected") {
          statusColor = "bg-red-100 text-red-700 border-red-300";
          statusMessage = "Your booking was rejected. Please contact customer service.";
        }

        bookingInfo.innerHTML =
          "<div class='border rounded-2xl p-5 bg-white shadow-sm'>" +
            "<div class='mb-4 p-3 rounded-xl border " + statusColor + "'>" +
              "<p class='font-bold'>Booking Status: " + (booking.status || "Pending") + "</p>" +
              "<p class='text-sm mt-1'>" + statusMessage + "</p>" +
            "</div>" +
            "<h4 class='text-xl font-bold text-emerald-700 mb-3'>Villa Aurelia Booking Receipt</h4>" +
            "<p><strong>Booking ID:</strong> " + (booking.bookingId || "N/A") + "</p>" +
            "<p><strong>Guest:</strong> " + booking.guestName + "</p>" +
            "<p><strong>Email:</strong> " + booking.email + "</p>" +
            "<p><strong>Room Type:</strong> " + (booking.roomType || "N/A") + "</p>" +
            "<p><strong>Check-in:</strong> " + (booking.checkin || "N/A") + "</p>" +
            "<p><strong>Check-out:</strong> " + (booking.checkout || "N/A") + "</p>" +
            "<p><strong>Nights:</strong> " + booking.nights + "</p>" +
            "<p><strong>Guests:</strong> " + booking.guests + "</p>" +
            "<p><strong>Last Updated:</strong> " + (booking.lastUpdated || "N/A") + "</p>" +
            "<p class='mt-3 text-lg'><strong>Total:</strong> $" + booking.total + "</p>" +
            "<button onclick='window.print()' class='mt-5 bg-slate-900 text-white px-5 py-2 rounded-lg hover:bg-slate-800'>Print Confirmation</button>" +
          "</div>";
      } else {
        bookingInfo.innerHTML =
          "<div class='bg-white border rounded-2xl p-5 text-center'>" +
            "<p>No booking confirmation found.</p>" +
            "<a href='villa-aurelia.html' class='inline-block mt-4 bg-emerald-700 text-white px-5 py-2 rounded-lg'>Book a Room</a>" +
          "</div>";
      }

      // Display booking history cards for guest/customer accounts.
      if (currentUser.bookings && currentUser.bookings.length > 0) {
        let historyCards = currentUser.bookings.map((item, index) => {
          let color = "text-yellow-600";
          if (item.status === "Approved") color = "text-green-600";
          if (item.status === "Rejected") color = "text-red-600";

          return "<div class='bg-white p-5 rounded-2xl shadow border border-emerald-100'>" +
            "<h4 class='font-bold text-emerald-700'>Booking #" + (index + 1) + "</h4>" +
            "<p><strong>Booking ID:</strong> " + (item.bookingId || "N/A") + "</p>" +
            "<p><strong>Status:</strong> <span class='" + color + "'>" + (item.status || "Pending") + "</span></p>" +
            "<p><strong>Guest:</strong> " + item.guestName + "</p>" +
            "<p><strong>Room:</strong> " + (item.roomType || "N/A") + "</p>" +
            "<p><strong>Check-in:</strong> " + (item.checkin || "N/A") + "</p>" +
            "<p><strong>Check-out:</strong> " + (item.checkout || "N/A") + "</p>" +
            "<p><strong>Nights:</strong> " + item.nights + "</p>" +
            "<p><strong>Guests:</strong> " + item.guests + "</p>" +
            "<p><strong>Total:</strong> $" + item.total + "</p>" +
            "<p><strong>Updated:</strong> " + (item.lastUpdated || "N/A") + "</p>" +
            "</div>";
        }).join("");

        bookingHistory.innerHTML =
          "<div class='glass-card p-6 sm:p-8 border border-emerald-200 rounded-3xl'>" +
          "<h3 class='text-2xl font-bold mb-4'>Booking History</h3>" +
          "<div class='grid md:grid-cols-2 gap-4'>" + historyCards + "</div>" +
          "</div>";
      } else {
        bookingHistory.innerHTML = "";
      }

      // Display role-based access information.
      if (currentUser.accountType === "Administrator") {
        rolePanel.innerHTML =
          "<div class='glass-card p-6 sm:p-8 border border-emerald-200 rounded-3xl'>" +
          "<h3 class='text-2xl font-bold text-emerald-700 mb-3'>Administrator Dashboard</h3>" +
          "<p><strong>Access Level:</strong> Full Access</p>" +
          "<p>Administrators can manage guest accounts, booking statuses, and hotel records.</p>" +
          "<a href='AdminDashboard.html' class='inline-block mt-4 bg-emerald-700 text-white px-6 py-3 rounded-xl'>Open Admin Dashboard</a>" +
          "</div>";
      } else {
        rolePanel.innerHTML =
          "<div class='glass-card p-6 sm:p-8 border border-emerald-200 rounded-3xl'>" +
          "<h3 class='text-2xl font-bold text-emerald-700 mb-3'>Guest Dashboard</h3>" +
          "<p><strong>Access Level:</strong> Limited Access</p>" +
          "<p>Guests can view their profile, booking history, reviews, and support options.</p>" +
          "<a href='GuestDashboard.html' class='inline-block mt-4 bg-emerald-700 text-white px-6 py-3 rounded-xl'>Open Guest Dashboard</a>" +
          "</div>";
      }
    };

    // Log the user out and clear their active session.
    function logoutUser() {
      localStorage.removeItem("villaLoggedIn");
      localStorage.removeItem("villaCurrentUser");
      window.location.href = "Login.html";
    }
  </script>
</body>
</html>
