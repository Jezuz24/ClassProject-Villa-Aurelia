<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Villa Aurelia - Guest Dashboard</title>

  <!-- Tailwind CSS CDN for utility classes -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom stylesheet for the Villa Aurelia theme -->
  <link rel="stylesheet" href="style.css">

  <!-- Main JavaScript file for validation, login, booking, and dashboard behavior -->
  <script src="validation.js" defer></script>
</head>
<body class="bg-stone-100 text-stone-900">
  <!-- Navigation bar used across the whole hotel website -->
  <header class="bg-slate-950/95 text-stone-100 px-4 sm:px-6 md:px-8 py-4 md:py-5 border-b border-emerald-800/50">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row gap-4 justify-between items-center">
      <h1 class="text-xl sm:text-2xl font-bold tracking-wide text-emerald-300">Villa Aurelia</h1>

      <nav class="flex flex-wrap justify-center gap-2 sm:gap-3 md:gap-4 text-xs sm:text-sm">
        <a href="index.html" class="hover:text-emerald-300">Home</a>
        <a href="villa-aurelia.html" class="hover:text-emerald-300">Booking</a>
        <a href="AboutUs.html" class="hover:text-emerald-300">About Us</a>
        <a href="Amenities.html" class="hover:text-emerald-300">Amenities</a>
        <a href="GuestReviews.html" class="hover:text-emerald-300">Guest Reviews</a>
        <a href="CustomerService.html" class="hover:text-emerald-300">Customer Service</a>
        <a href="Account.html" class="hover:text-emerald-300">Account</a>
        <a href="Profile.html" class="hover:text-emerald-300">Profile</a>
        <span id="navUser" class="text-emerald-300 font-bold"></span>
      </nav>
    </div>
  </header>

  <!-- Guest dashboard hero -->
  <section class="relative h-[320px] sm:h-[360px] md:h-[400px] bg-cover bg-center flex items-center justify-center"
    style="background-image: url('images/hero/banner.png');">

    <!-- Overlay -->
    <div class="absolute inset-0 bg-black/60"></div>

    <!-- Content -->
    <div class="relative z-10 text-center text-white">
      <p class="uppercase tracking-[0.3em] text-emerald-300 font-semibold">Guest Dashboard</p>
      <h2 class="text-3xl sm:text-4xl md:text-5xl font-bold mt-4 glow-text">Welcome to Your Guest Dashboard</h2>
      <p class="text-stone-200 mt-4">View your stay, booking status, and guest options.</p>
    </div>
  </section>

  <!-- Guest dashboard content generated by JavaScript -->
  <section class="w-full mx-auto px-4 sm:px-6 md:px-8 py-12 md:py-16 bg-gradient-to-br from-green-900 via-slate-600 to-emerald-500">
    <div class="max-w-5xl mx-auto">
      <div id="guestDashboardContent"></div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-slate-950 text-stone-300 text-center py-6 border-t border-emerald-900">
    <p>© 2026 Villa Aurelia Nature Hotel Booking System</p>
  </footer>

  <script>
    window.onload = function () {
      let loggedIn = localStorage.getItem("villaLoggedIn");
      let currentUser = JSON.parse(localStorage.getItem("villaCurrentUser"));
      let dashboard = document.getElementById("guestDashboardContent");

      // Require a logged-in account.
      if (loggedIn !== "true" || !currentUser) {
        dashboard.innerHTML =
          "<div class='glass-card rounded-3xl shadow-xl p-6 sm:p-8 border border-red-200 text-center'>" +
          "<h3 class='text-2xl font-bold text-red-600'>Access Denied</h3>" +
          "<p class='mt-3'>Please login to view your guest dashboard.</p>" +
          "<a href='Login.html' class='inline-block mt-5 bg-emerald-700 text-white px-6 py-3 rounded-xl'>Login</a>" +
          "</div>";
        return;
      }

      // Administrators should use the admin dashboard instead.
      if (currentUser.accountType === "Administrator") {
        dashboard.innerHTML =
          "<div class='glass-card rounded-3xl shadow-xl p-6 sm:p-8 border border-red-200 text-center'>" +
          "<h3 class='text-2xl font-bold text-red-600'>Guest Access Only</h3>" +
          "<p class='mt-3'>Administrators should use the Admin Dashboard.</p>" +
          "<a href='AdminDashboard.html' class='inline-block mt-5 bg-emerald-700 text-white px-6 py-3 rounded-xl'>Go to Admin Dashboard</a>" +
          "</div>";
        return;
      }

      let bookings = currentUser.bookings || [];
      let bookingCards = "";

      // Display all bookings for the current guest.
      if (bookings.length > 0) {
        bookingCards = bookings.map((booking, index) => {
          return `
            <div class="bg-white rounded-2xl shadow border border-emerald-100 p-6">
              <h4 class="text-xl font-bold text-emerald-700">Booking #${index + 1}</h4>
              <p class="mt-2"><strong>Status:</strong> ${booking.status || "Pending"}</p>
              <p><strong>Booking ID:</strong> ${booking.bookingId || "N/A"}</p>
              <p><strong>Room:</strong> ${booking.roomType || "N/A"}</p>
              <p><strong>Check-in:</strong> ${booking.checkin || "N/A"}</p>
              <p><strong>Check-out:</strong> ${booking.checkout || "N/A"}</p>
              <p><strong>Guest:</strong> ${booking.guestName}</p>
              <p><strong>Nights:</strong> ${booking.nights}</p>
              <p><strong>Guests:</strong> ${booking.guests}</p>
              <p><strong>Total:</strong> $${booking.total}</p>
            </div>
          `;
        }).join("");
      } else {
        bookingCards =
          "<div class='bg-white rounded-2xl shadow border border-emerald-100 p-6 text-center'>" +
          "<p>No bookings yet.</p>" +
          "<a href='villa-aurelia.html' class='inline-block mt-4 bg-emerald-700 text-white px-6 py-3 rounded-xl'>Book a Room</a>" +
          "</div>";
      }

      // Render dashboard sections.
      dashboard.innerHTML =
        "<div class='grid grid-cols-1 md:grid-cols-3 gap-6 mb-8'>" +
          "<div class='glass-card rounded-3xl shadow-xl p-6 border border-emerald-200'>" +
            "<h3 class='text-xl font-bold text-emerald-700'>Guest Information</h3>" +
            "<p class='mt-3'><strong>Name:</strong> " + currentUser.firstName + " " +
              (currentUser.middleName ? currentUser.middleName + " " : "") +
              currentUser.lastName + "</p>" +
            "<p><strong>Email:</strong> " + currentUser.email + "</p>" +
            "<p><strong>Account Type:</strong> " + currentUser.accountType + "</p>" +
          "</div>" +

          "<div class='glass-card rounded-3xl shadow-xl p-6 border border-emerald-200'>" +
            "<h3 class='text-xl font-bold text-emerald-700'>Quick Actions</h3>" +
            "<div class='mt-4 flex flex-col gap-3'>" +
              "<a href='villa-aurelia.html' class='bg-emerald-700 text-white px-4 py-2 rounded-lg text-center'>Book Room</a>" +
              "<a href='GuestReviews.html' class='bg-blue-700 text-white px-4 py-2 rounded-lg text-center'>Leave Review</a>" +
              "<a href='CustomerService.html' class='bg-stone-700 text-white px-4 py-2 rounded-lg text-center'>Customer Service</a>" +
            "</div>" +
          "</div>" +

          "<div class='glass-card rounded-3xl shadow-xl p-6 border border-emerald-200'>" +
            "<h3 class='text-xl font-bold text-emerald-700'>Access Level</h3>" +
            "<p class='mt-3'><strong>Limited Access</strong></p>" +
            "<p class='text-stone-600 mt-2'>Guests can view their profile, bookings, reviews, and support options.</p>" +
          "</div>" +
        "</div>" +

        "<div class='glass-card rounded-3xl shadow-xl p-6 sm:p-8 border border-emerald-200'>" +
          "<h3 class='text-2xl font-bold mb-6'>My Booking History</h3>" +
          "<div class='grid grid-cols-1 md:grid-cols-2 gap-6'>" +
            bookingCards +
          "</div>" +
        "</div>";
    };
  </script>
</body>
</html>
